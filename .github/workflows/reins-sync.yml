name: REINS → Notion Sync

on:
  schedule:
    # JST 10:00, 12:00, 14:00, 16:00, 18:00, 20:00, 22:00
    - cron: "0 1,3,5,7,9,11,13 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run REINS sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          REINS_LOGIN_ID: ${{ secrets.REINS_LOGIN_ID }}
          REINS_LOGIN_PASS: ${{ secrets.REINS_LOGIN_PASS }}
        run: bun scripts/reins-to-notion.js
